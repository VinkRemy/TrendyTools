<!doctype html>
<html lang=en>
<head>
<meta charset=UTF-8>
<meta name=viewport content="width=device-width,initial-scale=1">
<title>TrendyTools.net - QR Forge</title>
<link rel=stylesheet href=https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel=stylesheet>
<script src=https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js></script>
<link rel="stylesheet" href="/theme/theme.css">
<script src="/theme/theme.js"></script>
<link rel="stylesheet" href="style.css">
<link rel="preload" href="/theme/header.html" as="fetch">
<link rel="preload" href="/theme/footer.html" as="fetch">
<link rel=icon type=image/png href=/theme/favicon.png>
</head>
<body>
<div class=wrapper>
<header id=header-placeholder></header>
<div class=qr-card>
<h1>
<i class="fas fa-qrcode"></i> QR forge
</h1>
<div class=sub>
<i class="fas fa-link"></i> text · link · image URL
<i class="fas fa-arrow-right" style=opacity:.4;margin-left:6px></i>
</div>
<div class=input-group>
<div class=input-wrapper>
<i class="fas fa-pencil-alt"></i>
<input id=linkInput placeholder="e.g. https://myimage.com/photo.png or text">
</div>
<button class=generate-btn onclick=generateQR()>
<i class="fas fa-bolt"></i> Generate
</button>
</div>
<div class=qr-stage>
<div id=qrcode></div>
</div>
<div class=info-hint>
<div class=hint-text>
<i class="fas fa-image"></i>
<span>📸 Image URL?</span>
<small>Paste a direct link to a picture (.jpg, .png, etc.) - the QR will open it. Works for any text too.</small>
</div>
<button id=downloadBtn class=download-btn onclick=downloadQR()>
<i class="fas fa-download"></i> Download PNG
</button>
</div>
</div>
</div>
<div id=footer-placeholder></div>
<script src=script.js></script>
</body>
</html>
